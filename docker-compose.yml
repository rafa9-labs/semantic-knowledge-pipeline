# ============================================================
# Docker Compose - Semantic Knowledge Pipeline
# ============================================================
# This file defines our LOCAL DEVELOPMENT infrastructure.
# Running `docker compose up -d` will start:
#   1. A PostgreSQL database server
#   2. A pgAdmin web interface to visually browse that database
#
# HOW DOCKER NETWORKING WORKS HERE:
#   - Docker Compose automatically creates a virtual network for all
#     services in this file. Think of it as a private LAN.
#   - Containers talk to each other using their SERVICE NAMES as hostnames.
#     (e.g., pgAdmin connects to PostgreSQL via "db:5432")
#   - Your LOCAL Python scripts connect via "localhost:5432" because we
#     publish the port with "ports: - 5432:5432".
#     This maps your machine's port 5432 → container's internal port 5432.
# ============================================================

services:
  # ----------------------------------------------------------
  # SERVICE 1: PostgreSQL Database
  # This is our PRIMARY data store. All scraped articles,
  # processed concepts, and relationships will live here.
  # ----------------------------------------------------------
  db:
    image: postgres:16          # Official PostgreSQL image, version 16 (LTS)
    container_name: skp-db      # Friendly name for `docker ps` output
    restart: unless-stopped     # Auto-restart if the container crashes
    environment:
      # These are DEFAULT DEV credentials — NOT for production!
      # In production, these would come from a secrets manager (e.g., AWS SSM, Vault).
      POSTGRES_USER: skp_admin
      POSTGRES_PASSWORD: skp_dev_password
      POSTGRES_DB: knowledge_graph  # Database name created on first start
    ports:
      # Format: "HOST_PORT:CONTAINER_PORT"
      # Your Python scripts connect to localhost:5432 → routed to container's 5432
      - "5432:5432"
    volumes:
      # A Docker volume PERSISTS data beyond container restarts.
      # Without this, every `docker compose down` would DESTROY your database.
      # The data lives at /var/lib/postgresql/data inside the container.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # This tells Docker HOW to check if PostgreSQL is truly ready
      # (not just "running" but actually accepting connections).
      # pgAdmin and our scripts should wait for this to be "healthy".
      test: ["CMD-SHELL", "pg_isready -U skp_admin -d knowledge_graph"]
      interval: 5s       # Check every 5 seconds
      timeout: 5s        # Timeout after 5 seconds
      retries: 5         # Give up after 5 consecutive failures

  # ----------------------------------------------------------
  # SERVICE 2: pgAdmin (Web UI for PostgreSQL)
  # Think of this as "phpMyAdmin but for PostgreSQL."
  # You can browse tables, run queries, and inspect schemas
  # without writing SQL in a terminal.
  # ----------------------------------------------------------
  # ----------------------------------------------------------
  # SERVICE 3: Weaviate (Vector Database)
  # Weaviate stores EMBEDDINGS — mathematical representations (vectors)
  # of our knowledge triples. This enables SEMANTIC SEARCH:
  # "find concepts similar to X" rather than exact keyword matches.
  #
  # HOW VECTOR SEARCH WORKS:
  #   1. We convert each triple into text: "await keyword enables async behavior"
  #   2. Ollama's embedding model turns that text into a 768-dimensional vector
  #   3. Weaviate stores these vectors and can find the "closest" ones to a query
  #   4. "Closest" = most semantically similar meaning (not just keyword match)
  #
  # WHY WEAVIATE OVER PINECONE?
  #   - Fully local (no cloud dependency, matches our "$0, 0 cloud deps" philosophy)
  #   - Runs in Docker alongside PostgreSQL
  #   - No API keys needed
  #   - Free and open source
  # ----------------------------------------------------------
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.5
    container_name: skp-weaviate
    restart: unless-stopped
    ports:
      # REST API (our Python code talks to this)
      - "8080:8080"
      # gRPC API (faster for bulk operations — optional but recommended)
      - "50051:50051"
    environment:
      # DISABLE AUTHENTICATION for local dev (no API key needed)
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      # Allow running without a persistent volume during development
      # (data is still persisted via the volume below)
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      # Default vectorizer: we provide our OWN vectors via Ollama (not Weaviate's built-in)
      # "none" = we must supply vectors manually (which our embedder.py does)
      DEFAULT_VECTORIZER_MODULE: "none"
      # Disable auto-schema creation — we define our schema explicitly in code
      # This prevents accidental schema creation from malformed data
      ENABLE_MODULES: ""
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      # Weaviate's /v1/.well-known/ready returns 200 when ready to accept requests
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skp-pgadmin
    restart: unless-stopped
    environment:
      # Default login credentials for the pgAdmin WEB INTERFACE
      # (not the database — that's above in the `db` service)
      PGADMIN_DEFAULT_EMAIL: admin@skp.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      # Access pgAdmin in your browser at: http://localhost:5050
      - "5050:80"
    volumes:
      # Persist pgAdmin settings (saved connections, preferences)
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      # Wait for `db` to be healthy before starting pgAdmin.
      # Without this, pgAdmin might start before Postgres is ready
      # and fail to register the database connection.
      db:
        condition: service_healthy

# ============================================================
# VOLUMES: Named persistent storage
# These survive `docker compose down` but are removed with
# `docker compose down -v` (the -v flag removes volumes too).
# ============================================================
volumes:
  pgdata:
  pgadmin_data:
  weaviate_data:
